<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroTLS | Seguridad Bio-Médica</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
</div>

<div class="container">
    <div class="glass-card">
        <header>
            <div class="logo">🔒</div>
            <h1>NeuroTLS</h1>
            <p class="subtitle">Protocolo de Seguridad Avanzada</p>
        </header>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('login')">Ingresar</button>
            <button class="tab-btn" onclick="switchTab('register')">Registrar</button>
        </div>

        <!-- Formulario de Login -->
        <div id="login-form" class="auth-section active">
            <div class="input-group">
                <label for="username">Usuario</label>
                <div class="input-wrapper">
                    <span class="icon">👤</span>
                    <input type="text" id="username" placeholder="Tu nombre de usuario" required>
                </div>
            </div>
            <div class="input-group">
                <label for="password">Contraseña</label>
                <div class="input-wrapper">
                    <span class="icon">🔑</span>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
            </div>
            <button id="btnLogin" class="btn-primary">Iniciar Sesión</button>
        </div>

        <!-- Formulario de Registro -->
        <div id="register-form" class="auth-section">
            <div class="input-group">
                <label for="reg-username">Nuevo Usuario</label>
                <div class="input-wrapper">
                    <span class="icon">➕</span>
                    <input type="text" id="reg-username" placeholder="Crea un usuario" required>
                </div>
            </div>
            <div class="input-group">
                <label for="reg-password">Nueva Contraseña</label>
                <div class="input-wrapper">
                    <span class="icon">🛡️</span>
                    <input type="password" id="reg-password" placeholder="Mínimo 8 caracteres" required>
                </div>
            </div>
            <button id="btnRegister" class="btn-accent">Crear Cuenta de Acceso</button>
        </div>

        <div class="divider"></div>

        <div class="extra-actions">
            <button id="btnSecret" class="btn-secondary">Consultar Datos Encriptados</button>
        </div>

        <div id="resultado-container" class="status-box">
            <span class="status-label">Estado del Sistema</span>
            <div id="resultado">Esperando autenticación...</div>
        </div>

        <!-- Sección 2FA -->
        <div id="section-2fa" class="section-2fa">
            <h3>🛡️ Doble Factor (2FA)</h3>
            <p>Aumenta la seguridad vinculando tu cuenta.</p>
            
            <button onclick="configurar2FA()" class="btn-outline">
                Generar QR de Seguridad
            </button>
            
            <div id="qr-container" class="qr-container"></div>

            <div class="input-group">
                <input type="text" id="codigo2fa" placeholder="000 000" maxlength="6" class="code-input">
            </div>
            
            <button onclick="verificar2FA()" class="btn-primary">Verificar Identidad</button>
        </div>
    </div>
</div>

<script src="/script.js"></script>
<script src="/auth.js"></script>
<script>
    function switchTab(type) {
        const sections = document.querySelectorAll('.auth-section');
        const buttons = document.querySelectorAll('.tab-btn');
        
        sections.forEach(s => s.classList.remove('active'));
        buttons.forEach(b => b.classList.remove('active'));
        
        if (type === 'login') {
            document.getElementById('login-form').classList.add('active');
            buttons[0].classList.add('active');
        } else {
            document.getElementById('register-form').classList.add('active');
            buttons[1].classList.add('active');
        }
    }
</script>

</body>
</html>
