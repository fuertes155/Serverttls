<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroTLS | CyberSecurity Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<!-- Partículas de Fondo -->
<canvas id="particles-canvas"></canvas>

<div class="main-wrapper">
    <div class="system-status-bar">
        <div class="status-item">
            <span class="dot pulse-green"></span>
            <span class="status-text">DATABASE: CONNECTED</span>
        </div>
        <div class="status-item">
            <span class="dot pulse-blue"></span>
            <span class="status-text">SECURE TUNNEL: ACTIVE (TLS 1.3)</span>
        </div>
    </div>

    <div class="container">
        <div class="glass-card">
            <!-- Efecto de Escaneo -->
            <div class="scanner-line"></div>
            
            <header>
                <div class="shield-container">
                    <div class="shield-icon">🛡️</div>
                    <div class="shield-glow"></div>
                </div>
                <h1>NeuroTLS <span class="version">v2.4.0</span></h1>
                <p class="subtitle">Neural Security & Bio-Authentication</p>
            </header>

            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('login')">
                    <span class="tab-icon">🔑</span> ACCESO
                </button>
                <button class="tab-btn" onclick="switchTab('register')">
                    <span class="tab-icon">👤</span> REGISTRO
                </button>
            </div>

            <!-- Formulario de Login -->
            <div id="login-form" class="auth-section active">
                <div class="input-container">
                    <label>IDENTIFICADOR DE USUARIO</label>
                    <div class="input-wrapper">
                        <input type="text" id="username" placeholder="Ingrese ID de acceso" required>
                        <div class="input-focus-line"></div>
                    </div>
                </div>
                <div class="input-container">
                    <label>CÓDIGO DE SEGURIDAD</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" placeholder="••••••••" required>
                        <div class="input-focus-line"></div>
                    </div>
                </div>
                <button id="btnLogin" class="btn-primary main-btn">
                    <span class="btn-content">AUTENTICAR SISTEMA</span>
                    <div class="btn-shine"></div>
                </button>
            </div>

            <!-- Formulario de Registro -->
            <div id="register-form" class="auth-section">
                <div class="input-container">
                    <label>CREAR IDENTIFICADOR</label>
                    <div class="input-wrapper">
                        <input type="text" id="reg-username" placeholder="Mínimo 4 caracteres" required>
                        <div class="input-focus-line"></div>
                    </div>
                </div>
                <div class="input-container">
                    <label>CONTRASEÑA MAESTRA</label>
                    <div class="input-wrapper">
                        <input type="password" id="reg-password" placeholder="Cifrado robusto" required>
                        <div class="input-focus-line"></div>
                    </div>
                </div>
                <button id="btnRegister" class="btn-accent main-btn">
                    <span class="btn-content">GENERAR NUEVAS CREDENCIALES</span>
                    <div class="btn-shine"></div>
                </button>
            </div>

            <div class="divider">
                <span class="divider-text">CONSOLE INTERFACE</span>
            </div>

            <div class="extra-actions">
                <button id="btnSecret" class="btn-terminal">
                    <span class="cmd-prefix">></span> QUERY_ENCRYPTED_DATA
                </button>
            </div>

            <div id="resultado-container" class="terminal-box">
                <div class="terminal-header">
                    <div class="term-dot red"></div>
                    <div class="term-dot yellow"></div>
                    <div class="term-dot green"></div>
                    <span class="term-title">system_logs</span>
                </div>
                <div id="resultado" class="mono">ROOT@NEUROTLS:~# awaiting_input...</div>
            </div>

            <!-- Sección 2FA -->
            <div id="section-2fa" class="section-2fa">
                <h3>🛡️ MULTI-FACTOR AUTHENTICATION</h3>
                <p>Verify your identity via hardware token or app.</p>
                
                <button onclick="configurar2FA()" class="btn-outline-glow">
                    SYNC SECURITY TOKEN
                </button>
                
                <div id="qr-container" class="qr-preview-box"></div>

                <div class="input-container center">
                    <input type="text" id="codigo2fa" placeholder="000000" maxlength="6" class="otp-input">
                </div>
                
                <button onclick="verificar2FA()" class="btn-primary main-btn">
                    VALIDATE TOKEN
                </button>
            </div>
        </div>
    </div>
</div>

<script src="/script.js"></script>
<script src="/auth.js"></script>
<script>
    // Sistema de Pestañas
    function switchTab(type) {
        const sections = document.querySelectorAll('.auth-section');
        const buttons = document.querySelectorAll('.tab-btn');
        sections.forEach(s => s.classList.remove('active'));
        buttons.forEach(b => b.classList.remove('active'));
        
        if (type === 'login') {
            document.getElementById('login-form').classList.add('active');
            buttons[0].classList.add('active');
        } else {
            document.getElementById('register-form').classList.add('active');
            buttons[1].classList.add('active');
        }
    }

    // Partículas de Fondo Estilo Matrix/Neural
    const canvas = document.getElementById('particles-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    window.addEventListener('resize', resize);
    resize();

    class Particle {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 2;
            this.speedX = (Math.random() - 0.5) * 0.5;
            this.speedY = (Math.random() - 0.5) * 0.5;
            this.color = `rgba(79, 70, 229, ${Math.random() * 0.5})`;
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            if (this.x > canvas.width) this.x = 0;
            if (this.x < 0) this.x = canvas.width;
            if (this.y > canvas.height) this.y = 0;
            if (this.y < 0) this.y = canvas.height;
        }
        draw() {
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    function init() {
        for (let i = 0; i < 100; i++) {
            particles.push(new Particle());
        }
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => {
            p.update();
            p.draw();
        });
        
        // Dibujar líneas entre partículas cercanas
        particles.forEach((p1, i) => {
            for (let j = i + 1; j < particles.length; j++) {
                const p2 = particles[j];
                const dx = p1.x - p2.x;
                const dy = p1.y - p2.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 100) {
                    ctx.strokeStyle = `rgba(79, 70, 229, ${0.1 * (1 - dist / 100)})`;
                    ctx.beginPath();
                    ctx.moveTo(p1.x, p1.y);
                    ctx.lineTo(p2.x, p2.y);
                    ctx.stroke();
                }
            }
        });
        requestAnimationFrame(animate);
    }

    init();
    animate();
</script>

</body>
</html>
